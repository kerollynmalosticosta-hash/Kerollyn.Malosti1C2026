<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Designer - Blog & Guia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Hero Header com overlay sutil e imagem de fundo profissional */
        .hero {
            background: linear-gradient(rgba(244, 63, 94, 0.3), rgba(0, 0, 0, 0.75)), url('https://images.unsplash.com/photo-1604654894610-df490651e56c?q=80&w=1920') no-repeat center center/cover;
            min-height: 80vh;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 40px;
            text-align: center;
        }

        /* Topbar de Navegação */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #f43f5e; /* Rosa em destaque no hover */
        }

        .btn-add {
            background-color: #f43f5e; /* Botão Rosa */
            color: white !important;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn-add:hover {
            background-color: #e11d48;
        }

        /* Conteúdo Central alterado para "Nail Designer" */
        .hero-content {
            max-width: 800px;
            margin: auto;
        }

        .hero-content h1 {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 15px;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero-content p {
            font-size: 18px;
            color: #ffe4e6; /* Texto em tom rosa claro */
            margin-bottom: 40px;
        }

            padding: 10px;
            display: flex;
            align-items: center;
